<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="Social Bingo - Find people who match the questions!">
    <title>Soc Ops - Social Bingo</title>
    <link rel="stylesheet" href="http://localhost:8001/static/css/app.css">
    <link rel="icon" type="image/png" href="http://localhost:8001/static/favicon.png">
    <script src="http://localhost:8001/static/js/htmx.min.js"></script>
</head>
<body>
    <div id="app">
        

    <div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6 bg-gray-50">
    <div class="text-center max-w-sm">
        <h1 class="text-4xl font-bold text-gray-900 mb-2">Soc Ops</h1>
        <p class="text-lg text-gray-600 mb-8">Social Bingo</p>

        <div class="bg-white rounded-lg p-6 shadow-sm border border-gray-200 mb-8">
            <h2 class="font-semibold text-gray-800 mb-3">How to play</h2>
            <ul class="text-left text-gray-600 text-sm space-y-2">
                <li>• Find people who match the questions</li>
                <li>• Tap a square when you find a match</li>
                <li>• Get 5 in a row to win!</li>
            </ul>
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full bg-accent text-white font-semibold py-4 px-8 rounded-lg text-lg active:bg-accent-light transition-colors">
            Start Game
        </button>
    </div>
</div>
</div>


    </div>
</body>
</html>
